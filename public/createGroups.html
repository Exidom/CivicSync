<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CivicSync Create Groups Page</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>Civic Sync</h1>
  <!-- TODO: Add way to where users get redirected to the login page if they are not logged in first and then redirected back -->

  <nav>
    <a href = "login.html">Volunteer Now!</a>
    <a href = "createOrganizations.html">Need Volunteers?</a>
    <a href = "aboutUs.html">About Us</a>
  </nav>


  <div id="content"></div>

  <h2>Want to Create a Group?</h2>
  <h2>Start Below!</h2>
  <form id="createGroupForm">
    <label for="email">Group Email</label>
    <input type="email" id="groupEmail" placeholder="Enter your group email" required>

    <label for="firstName">Group Name</label>
    <input type="text" id="groupName" placeholder="Enter your group name" required>

    <label for="phone">Group Phone Number</label>
    <input type="tel" id="phone" placeholder="Enter your phone number">

    <label for="photo">Profile Picture</label>
    <input type="file" id="photo" accept="image/*">

    <button type="submit">Save Profile</button>
  </form>

  <script src="app.js"></script>
</body>

<footer>

</html>
