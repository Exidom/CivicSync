<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CivicSync Create Organizations Page</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>Civic Sync</h1>
  <img id="profile-pic" src="default-profile.png" alt="Profile Picture">

  <nav>
    <a href = "login.html">Volunteer Now!</a>
    <a href = "createOrganizations.html">Need Volunteers?</a>
    <a href = "aboutUs.html">About Us</a>
  </nav>


  <div id="content"></div>

  <h2>Want to Sign Your Organization Up to Get Volunteers?</h2>
  <h2>Start Below!</h2>
  <form id="createOrganizationForm">
    <label for="email">Organization Email</label>
    <input type="email" id="OrganizationEmail" placeholder="Enter your organization's email" required>

    <label for="firstName">Organization Name</label>
    <input type="text" id="groupName" placeholder="Enter your organization's name" required>

    <label for="phone">Organization Phone Number</label>
    <input type="tel" id="phone" placeholder="Enter your organization's phone number" required>

    <label for="photo">Profile Picture</label>
    <input type="file" id="photo" accept="image/*">

    <button type="submit">Save Profile</button>
  </form>

  <a href = "login.html">Already have an account? Login Here!</a>

  <script src="app.js"></script>
</body>

<footer>
  <nav>
    <p> Follow Us: </p>
    <button onclick>Facebook</button>
    <button onclick>Instagram</button>
    <button onclick>Twitter</button>
    <button onclick>Youtube</button>
  </nav>
  <nav>
    <p> Contact Us At: </p>
    <p>XYZ Address</p>
    <p> 111-111-1111 </p>
    <p>contactus@civicsync.org</p>
  </nav>
</footer>
</html>
